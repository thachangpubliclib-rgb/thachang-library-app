<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Lib Thachang - Smart Library</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Prompt', 'Sarabun', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #fda085 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .float-animation { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .news-scroll { animation: scrollNews 25s linear infinite; display: inline-block; white-space: nowrap; }
        @keyframes scrollNews { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .progress-fill { background: linear-gradient(90deg, #667eea, #f093fb); transition: width 0.5s ease; }
    </style>
</head>
<body class="h-full overflow-hidden bg-gray-50">

    <div id="app" class="h-full w-full">
        <div id="intro-screen" class="h-full w-full gradient-bg flex flex-col items-center justify-center p-6 z-[1000] fixed inset-0 transition-opacity duration-1000">
            <div class="text-center">
                <div class="float-animation mb-8">
                    <svg class="w-32 h-32 mx-auto text-white drop-shadow-2xl" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>
                </div>
                <h1 id="intro-title" class="text-4xl md:text-6xl font-bold text-white mb-4 drop-shadow-lg">V Lib Thachang</h1>
                <p id="intro-subtitle" class="text-xl text-white/90 font-light tracking-widest uppercase">Reading Changes Life</p>
                <div class="mt-12 flex justify-center gap-2">
                    <span class="w-3 h-3 bg-white rounded-full animate-bounce"></span>
                    <span class="w-3 h-3 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                    <span class="w-3 h-3 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                </div>
            </div>
            <p class="absolute bottom-8 text-white/70 text-sm">กำลังเตรียมความพร้อม...</p>
        </div>

        <div id="login-screen" class="h-full w-full gradient-bg hidden flex flex-col items-center justify-center p-6">
            <div class="glass-card rounded-[3rem] p-10 w-full max-w-md shadow-2xl border-b-8 border-purple-600 text-center">
                <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg text-4xl">📖</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">V Lib Login</h2>
