<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V Lib Thachang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; transition: 0.3s; }
        .light { background: #fdf2f8; color: #1f2937; }
        .dark { background: #0f172a; color: #f8fafc; }
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(147, 51, 234, 0.2); }
        .light .glass { background: rgba(255, 255, 255, 0.9); }
        .dark .glass { background: rgba(30, 41, 59, 0.8); }
        .hidden { display: none !important; }
        .nav-btn { position: fixed; bottom: 25px; right: 25px; z-index: 50; transition: 0.3s; cursor: pointer; }
        .nav-btn:hover { transform: scale(1.1); }
        .option-btn { transition: 0.2s; border: 2px solid transparent; }
        .option-btn:hover { border-color: #9333ea; background: rgba(147, 51, 234, 0.1); }
    </style>
</head>
<body class="light">

    <header id="app-header" class="hidden fixed top-0 w-full z-[100] p-4 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold text-purple-600">V Lib Thachang</h1>
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="p-2 rounded-full glass text-lg">🌓</button>
            <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-md">ออก</button>
        </div>
    </header>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md text-center shadow-2xl border-b-8 border-purple-600">
            <img src="https://cdn-icons-png.flaticon.com/512/3389/3389081.png" class="w-20 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-purple-600 mb-2">V Lib Thachang</h1>
            <input type="email" id="login-email" placeholder="อีเมลของคุณ" class="w-full mb-4 p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 outline-none text-black dark:text-white">
            <input type="password" id="login-password" placeholder="รหัสผ่าน" class="w-full mb-6 p-4 rounded-2xl bg-gray-100 dark:bg-gray-800 outline-none text-black dark:text-white">
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="intro-screen" class="hidden min-h-screen pt-24 p-6 flex items-center justify-center">
        <div class="glass max-w-2xl p-10 rounded-[3.5rem] shadow-2xl border-t-8 border-yellow-400 text-center">
            <h2 class="text-2xl font-bold text-purple-600 mb-6">คำขวัญอำเภอท่าฉาง</h2>
            <div class="bg-yellow-50 dark:bg-yellow-900/20 p-8 rounded-3xl mb-8 border border-yellow-200">
                <p class="text-xl text-gray-700 dark:text-yellow-400 font-bold leading-relaxed">
                    “ฟาร์มหอยแครง แหล่งกุ้งกุลาดำ แห่น้ำประจำปี ประเพณีแข่งเรือ ล้นเหลือนาข้าว มะพร้าวหมากพลู งามหรูธารน้ำร้อน อนุสรณ์พ่อท่านแบน หมื่นแสนตาลโตนด ของโปรดเคยกุ้ง”
                </p>
            </div>
            <button onclick="goTo('library')" class="w-full bg-purple-600 text-white font-bold py-4 rounded-2xl shadow-lg">เข้าอ่านหนังสือ ➡️</button>
        </div>
    </div>

        <div class
